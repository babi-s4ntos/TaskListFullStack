<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskListApp - Resultado</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Roboto', sans-serif;
            background:#f5f5f5;
            min-height:100vh;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            padding:40px 20px;
        }

        /* =========================
           TÍTULO DA PÁGINA
        ========================== */

        .page-header{
            max-width:700px;
            text-align:center;
            margin-bottom:35px;
            padding:24px;
        }

        .page-header h1{
            font-size:42px;
            font-weight:800;
            letter-spacing:1px;

            background:linear-gradient(90deg, #6200EE, #9C4DFF);

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            margin-bottom:14px;

            position:relative;
        }

        .page-header h1::after{

            content:'';

            width:120px;
            height:4px;

            background:linear-gradient(
                90deg,
                #6200EE,
                #9C4DFF
            );

            border-radius:10px;

            display:block;

            margin:14px auto 0 auto;
        }

        .page-header p{

            font-size:17px;
            color:#616161;

            line-height:1.7;

            max-width:620px;
            margin:0 auto;
        }

        /* =========================
           CELULAR
        ========================== */

        .phone-frame{

            width:375px;
            height:667px;

            background:white;

            border-radius:30px;

            box-shadow:
                0 20px 60px rgba(0,0,0,0.3);

            overflow:hidden;

            position:relative;
        }

        .status-bar{

            background:#6200EE;
            color:white;

            padding:8px 16px;

            font-size:12px;

            display:flex;
            justify-content:space-between;
        }

        .top-bar{

            background:#6200EE;
            color:white;

            padding:16px;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .top-bar h1{
            font-size:20px;
        }

        .refresh-btn{

            background:none;
            border:none;

            color:white;

            font-size:24px;

            cursor:pointer;
        }

        .content{

            padding:16px;

            height:calc(100% - 140px);

            overflow-y:auto;

            background:#f5f5f5;
        }

        /* =========================
           CARDS
        ========================== */

        .task-card{

            background:white;

            border-radius:12px;

            padding:16px;

            margin-bottom:12px;

            box-shadow:
                0 2px 6px rgba(0,0,0,0.08);

            transition:0.2s;
        }

        .task-card:hover{

            transform:translateY(-2px);

            box-shadow:
                0 6px 14px rgba(0,0,0,0.12);
        }

        .task-card h3{

            font-size:18px;

            color:#212121;

            margin-bottom:6px;
        }

        .task-card p{

            font-size:14px;

            color:#757575;

            margin-bottom:10px;
        }

        .task-footer{

            display:flex;

            justify-content:space-between;

            align-items:center;
        }

        .task-id{

            font-size:12px;

            color:#9E9E9E;
        }

        .status-badge{

            padding:4px 12px;

            border-radius:12px;

            font-size:12px;

            color:white;

            font-weight:500;
        }

        .status-pending{
            background:#FFA000;
        }

        .status-completed{
            background:#4CAF50;
        }

        /* =========================
           BOTÃO FLUTUANTE
        ========================== */

        .fab{

            position:absolute;

            bottom:20px;
            right:20px;

            width:56px;
            height:56px;

            background:#6200EE;

            border-radius:16px;

            display:flex;

            justify-content:center;
            align-items:center;

            color:white;

            font-size:24px;

            cursor:pointer;

            box-shadow:
                0 4px 12px rgba(98,0,238,0.4);

            transition:0.2s;
        }

        .fab:hover{
            transform:scale(1.1);
        }

        /* =========================
           DIALOG
        ========================== */

        .dialog-overlay{

            position:absolute;

            top:0;
            left:0;
            right:0;
            bottom:0;

            background:rgba(0,0,0,0.5);

            display:none;

            justify-content:center;
            align-items:center;
        }

        .dialog{

            background:white;

            border-radius:28px;

            padding:24px;

            width:280px;
        }

        .dialog h2{
            margin-bottom:16px;
        }

        .form-group{
            margin-bottom:12px;
        }

        .form-group label{

            display:block;

            margin-bottom:4px;

            font-size:12px;

            color:#6200EE;
        }

        .form-group input,
        .form-group textarea{

            width:100%;

            padding:8px 12px;

            border:1px solid #E0E0E0;

            border-radius:4px;

            font-size:14px;
        }

        .form-group textarea{

            resize:vertical;

            min-height:60px;
        }

        .dialog-buttons{

            display:flex;

            justify-content:flex-end;

            gap:8px;

            margin-top:16px;
        }

        .dialog-btn{

            padding:8px 16px;

            border:none;

            border-radius:4px;

            cursor:pointer;
        }

        .dialog-btn.cancel{

            background:transparent;

            color:#6200EE;
        }

        .dialog-btn.confirm{

            background:#6200EE;

            color:white;
        }

        /* =========================
           SNACKBAR
        ========================== */

        .snackbar{

            position:absolute;

            bottom:80px;
            left:16px;
            right:16px;

            background:#323232;

            color:white;

            padding:14px 16px;

            border-radius:4px;

            display:none;

            justify-content:space-between;
            align-items:center;
        }

        .snackbar.success{
            background:#4CAF50;
        }

        .snackbar.error{
            background:#F44336;
        }

        .snackbar-btn{

            background:none;

            border:none;

            color:white;

            cursor:pointer;

            font-weight:bold;
        }

        /* =========================
           LOADING
        ========================== */

        .loading{

            display:flex;

            justify-content:center;
            align-items:center;

            height:100%;
        }

        .spinner{

            width:40px;
            height:40px;

            border:3px solid #E0E0E0;

            border-top-color:#6200EE;

            border-radius:50%;

            animation:spin 1s linear infinite;
        }

        @keyframes spin{

            to{
                transform:rotate(360deg);
            }
        }

    </style>
</head>

<body>

    <!-- TÍTULO FORA DO CELULAR -->
    <div class="page-header">

        <h1>
            Resultado do Projeto
        </h1>

        <p>
            Modelo para visualização de uma aplicação de lista de tarefas,
            simulando uma interface mobile com funcionalidades de criação,
            gerenciamento e atualização de tarefas.
        </p>

    </div>

    <!-- CELULAR -->
    <div class="phone-frame">

        <!-- STATUS BAR -->
        <div class="status-bar">

            <span>9:41</span>

            <span>📶 🔋</span>

        </div>

        <!-- TOPO -->
        <div class="top-bar">

            <h1>
                Lista de Tarefas
            </h1>

            <button class="refresh-btn"
                    onclick="refreshTasks()">

                🔄

            </button>

        </div>

        <!-- CONTEÚDO -->
        <div class="content"
             id="content">

        </div>

        <!-- BOTÃO -->
        <div class="fab"
             onclick="showDialog()">

            ➕

        </div>

        <!-- DIALOG -->
        <div class="dialog-overlay"
             id="dialogOverlay">

            <div class="dialog">

                <h2>
                    Nova Tarefa
                </h2>

                <div class="form-group">

                    <label>
                        Título
                    </label>

                    <input type="text"
                           id="taskTitle"
                           placeholder="Digite o título">

                </div>

                <div class="form-group">

                    <label>
                        Descrição
                    </label>

                    <textarea id="taskDescription"
                              placeholder="Digite a descrição"></textarea>

                </div>

                <div class="dialog-buttons">

                    <button class="dialog-btn cancel"
                            onclick="hideDialog()">

                        Cancelar

                    </button>

                    <button class="dialog-btn confirm"
                            onclick="addTask()">

                        Adicionar

                    </button>

                </div>

            </div>

        </div>

        <!-- SNACKBAR -->
        <div class="snackbar"
             id="snackbar">

            <span id="snackbarMessage">

                Tarefa criada com sucesso!

            </span>

            <button class="snackbar-btn"
                    onclick="hideSnackbar()">

                OK

            </button>

        </div>

    </div>

    <script>

        let tasks = [

            {
                id:1,
                title:'Comprar leite',
                description:'Ir ao mercado comprar leite',
                completed:false
            },

            {
                id:2,
                title:'Estudar Kotlin',
                description:'Revisar conceitos de Kotlin',
                completed:true
            },

            {
                id:3,
                title:'Fazer exercícios',
                description:'30 minutos de caminhada',
                completed:false
            }

        ];

        function renderTasks(){

            const content =
                document.getElementById('content');

            content.innerHTML = tasks.map(task => `

                <div class="task-card">

                    <h3>
                        ${task.title}
                    </h3>

                    <p>
                        ${task.description}
                    </p>

                    <div class="task-footer">

                        <span class="task-id">

                            ID: ${task.id}

                        </span>

                        <span class="status-badge
                            ${task.completed
                                ? 'status-completed'
                                : 'status-pending'}">

                            ${task.completed
                                ? 'Concluída'
                                : 'Pendente'}

                        </span>

                    </div>

                </div>

            `).join('');

        }

        function showDialog(){

            document
                .getElementById('dialogOverlay')
                .style.display = 'flex';

            document
                .getElementById('taskTitle')
                .value = '';

            document
                .getElementById('taskDescription')
                .value = '';
        }

        function hideDialog(){

            document
                .getElementById('dialogOverlay')
                .style.display = 'none';
        }

        function addTask(){

            const title =
                document.getElementById('taskTitle').value;

            const description =
                document.getElementById('taskDescription').value;

            if(!title.trim()){

                showSnackbar(
                    'Preencha o título',
                    'error'
                );

                return;
            }

            tasks.push({

                id:tasks.length + 1,

                title:title,

                description:description,

                completed:false
            });

            hideDialog();

            renderTasks();

            showSnackbar(
                'Tarefa criada com sucesso!',
                'success'
            );
        }

        function showSnackbar(message, type){

            const snackbar =
                document.getElementById('snackbar');

            document
                .getElementById('snackbarMessage')
                .textContent = message;

            snackbar.className =
                'snackbar ' + type;

            snackbar.style.display = 'flex';
        }

        function hideSnackbar(){

            document
                .getElementById('snackbar')
                .style.display = 'none';
        }

        function refreshTasks(){

            const content =
                document.getElementById('content');

            content.innerHTML = `

                <div class="loading">

                    <div class="spinner"></div>

                </div>

            `;

            setTimeout(() => {

                renderTasks();

                showSnackbar(
                    'Lista atualizada!',
                    'success'
                );

            }, 1000);
        }

        // INICIALIZAÇÃO
        renderTasks();

    </script>

</body>
</html>
